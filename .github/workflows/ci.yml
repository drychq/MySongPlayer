name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: core
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show tool versions
        run: |
          cmake --version
          ninja --version
          c++ --version

      - name: Configure portable core
        run: cmake --preset core-only

      - name: Build portable core
        run: cmake --build --preset core-only --parallel

      - name: Test portable core
        run: ctest --preset core-only
